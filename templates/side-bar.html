<!-- Mobile-only top bar (brand, search, AI placeholder, profile) — styled in side-bar.css -->
<header class="mobile-app-topbar" role="banner" aria-label="DiariCore">
    <div class="mobile-app-topbar__inner">
        <div class="mobile-app-topbar__default">
            <a href="dashboard.html" class="mobile-app-topbar__brand">
                <span class="mobile-app-topbar__brand-icon" aria-hidden="true">
                    <img src="diariclogo.png?v=20260516" alt="" class="mobile-app-topbar__brand-logo" width="32" height="32" decoding="async">
                </span>
                <span class="mobile-app-topbar__brand-name">DIARICORE</span>
            </a>
            <span class="mobile-app-topbar__divider" aria-hidden="true"></span>
            <div class="mobile-app-topbar__actions">
                <button type="button" class="mobile-app-topbar__btn mobile-app-topbar__btn--search-toggle" aria-label="Open search" aria-expanded="false" aria-controls="mobileAppTopbarSearchInput">
                    <i class="bi bi-search"></i>
                </button>
                    <a href="profile.html" class="mobile-app-topbar__profile" aria-label="Profile">
                        <img class="mobile-app-topbar__profile-img" alt="" width="32" height="32" decoding="async" hidden>
                        <i class="bi bi-person-fill mobile-app-topbar__profile-fallback" aria-hidden="true"></i>
                    </a>
            </div>
        </div>
        <div class="mobile-app-topbar__search-expand" id="mobileAppTopbarSearchExpand" aria-hidden="true">
            <button type="button" class="mobile-app-topbar__search-close" aria-label="Close search">
                <i class="bi bi-x-lg"></i>
            </button>
            <div class="mobile-app-topbar__search-field">
                <i class="bi bi-search mobile-app-topbar__search-field-icon" aria-hidden="true"></i>
                <input type="search" id="mobileAppTopbarSearchInput" class="mobile-app-topbar__search-input" placeholder="Search entries..." autocomplete="off" enterkeyhint="search" />
                <button type="button" class="mobile-app-topbar__filter-trigger" id="mobileTopbarFilterTrigger" aria-label="Filter entries" title="Filter">
                    <i class="bi bi-funnel"></i>
                </button>
            </div>
        </div>
    </div>
</header>
