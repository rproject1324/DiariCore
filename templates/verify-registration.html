<!DOCTYPE html>
<html lang="en" class="diari-shell-pending">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="diari-shell-pending.css">
    <title>Verify Registration - DiariCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="verify-registration.css" rel="stylesheet">
    <link href="theme.css" rel="stylesheet">
    <link href="mobile-global.css" rel="stylesheet">
    <script src="theme.js"></script>
    <link href="pwa.css" rel="stylesheet">
    <script src="pwa.js"></script>

</head>
<body>
    <div class="page">
        <div class="verify-shell">
            <aside class="verify-side">
                <div class="verify-side-brand">
                    <img src="diariclogo.png?v=20260516" alt="DiariCore" class="verify-logo" width="160" height="160" decoding="async">
                    <div class="verify-side-text">
                        <h2>Almost There!</h2>
                        <p>Verify your account to continue your DiariCore journey.</p>
                    </div>
                </div>
            </aside>

            <div class="card">
                <div class="header">
                    <div class="icon">
                        <i class="bi bi-shield-lock"></i>
                    </div>
                    <h1>Account Verification</h1>
                    <p>Enter the 6-digit code sent to your email</p>
                </div>

                <div class="email" id="emailDisplay"></div>

                <div class="otp" id="otpInputs">
                    <input class="digit" inputmode="numeric" maxlength="1" aria-label="Digit 1">
                    <input class="digit" inputmode="numeric" maxlength="1" aria-label="Digit 2">
                    <input class="digit" inputmode="numeric" maxlength="1" aria-label="Digit 3">
                    <input class="digit" inputmode="numeric" maxlength="1" aria-label="Digit 4">
                    <input class="digit" inputmode="numeric" maxlength="1" aria-label="Digit 5">
                    <input class="digit" inputmode="numeric" maxlength="1" aria-label="Digit 6">
                </div>

                <button class="btn" id="verifyBtn" disabled>
                    <i class="bi bi-check2-circle" id="verifyBtnIcon"></i>
                    <span id="verifyBtnText">Verify Code</span>
                </button>

                <div class="alert alert-error" id="otpError" hidden aria-live="polite">
                    <div class="alert__left">
                        <i class="bi bi-exclamation-circle"></i>
                        <span class="alert__text"></span>
                    </div>
                    <button class="alert__close" id="otpErrorClose" aria-label="Close">×</button>
                </div>
                <div class="alert alert-success" id="otpSuccess" hidden aria-live="polite">
                    <div class="alert__left">
                        <i class="bi bi-check-circle"></i>
                        <span class="alert__text"></span>
                    </div>
                    <button class="alert__close" id="otpSuccessClose" aria-label="Close">×</button>
                </div>

                <div class="meta">
                    <button class="link" id="resendBtn">Resend Code</button>
                    <div class="timer" id="timerLabel">Code expires in 10:00</div>
                </div>

                <div class="footer">
                    <a class="back" href="register.html">
                        <i class="bi bi-arrow-left"></i>
                        Back to registration
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="diari-security.js"></script>    <script src="diari-offline.js"></script>
    <script src="diari-shell.js"></script>
    <script src="verify-registration.js"></script>
</body>
</html>
